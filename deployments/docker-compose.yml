services:
  # PostgreSQL with pgvector — port 5433 to avoid conflict
  postgres:
    image: pgvector/pgvector:pg16
    container_name: optimusai-postgres
    environment:
      POSTGRES_USER: optimus
      POSTGRES_PASSWORD: optimus
      POSTGRES_DB: optimusai
    ports:
      - "5433:5432"
    volumes:
      - optimusai_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U optimus -d optimusai"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Redis — port 6380 to avoid conflict
  redis:
    image: redis:7-alpine
    container_name: optimusai-redis
    ports:
      - "6380:6379"
    volumes:
      - optimusai_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # MinIO (S3-compatible storage)
  minio:
    image: minio/minio
    container_name: optimusai-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9002:9000"
      - "9003:9001"
    volumes:
      - optimusai_minio_data:/data

  # OptimusAI API
  api:
    build:
      context: ..
      dockerfile: deployments/Dockerfile
    container_name: optimusai-api
    ports:
      - "8010:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://optimus:optimus@postgres:5432/optimusai
      - REDIS_URL=redis://redis:6379/0
      - S3_ENDPOINT_URL=http://minio:9000
      - S3_ACCESS_KEY=minioadmin
      - S3_SECRET_KEY=minioadmin
      - S3_BUCKET_NAME=optimusai
      - S3_PUBLIC_URL=http://localhost:9002
      - DEBUG=true
      - ENVIRONMENT=development
      - JWT_SECRET_KEY=dev-secret-key-change-in-production-42
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
      - COMFYUI_BASE_URL=http://host.docker.internal:8188
      - DEFAULT_LLM_PROVIDER=gemini
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - CORS_ORIGINS=["http://localhost:3000","http://localhost:4000","http://localhost:4001","http://localhost:8000","http://localhost:8020"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ../app:/code/app
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # ARQ Worker
  worker:
    build:
      context: ..
      dockerfile: deployments/Dockerfile.worker
    container_name: optimusai-worker
    environment:
      - DATABASE_URL=postgresql+asyncpg://optimus:optimus@postgres:5432/optimusai
      - REDIS_URL=redis://redis:6379/0
      - S3_ENDPOINT_URL=http://minio:9000
      - S3_ACCESS_KEY=minioadmin
      - S3_SECRET_KEY=minioadmin
      - S3_BUCKET_NAME=optimusai
      - JWT_SECRET_KEY=dev-secret-key-change-in-production-42
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
      - DEFAULT_LLM_PROVIDER=gemini
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # Next.js Frontend
  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: optimusai-frontend
    ports:
      - "8020:3000"
    environment:
      - API_URL=http://api:8000
      - NODE_ENV=development
    volumes:
      - ../frontend:/app
      - /app/node_modules # Important to keep container's node_modules
    depends_on:
      - api

volumes:
  optimusai_pg_data:
  optimusai_redis_data:
  optimusai_minio_data:
